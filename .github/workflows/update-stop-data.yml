name: Update stop data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - ".github/workflows/update-stop-data.yml"
  schedule:
    - cron: "17 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate configuration
        run: test -n "${{ vars.GTFS_URL }}"
      - name: Build city packages
        env:
          SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
        run: >-
          python scripts/build_stop_packages.py
          --gtfs-url "${{ vars.GTFS_URL }}"
          --rnv-gateway-url "${{ vars.RNV_GATEWAY_URL }}"
          --vag-gateway-url "${{ vars.VAG_GATEWAY_URL }}"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
