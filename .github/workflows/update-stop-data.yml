name: Update stop data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - ".github/workflows/update-stop-data.yml"
  schedule:
    - cron: "17 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore GTFS ETag cache
        uses: actions/cache@v4
        id: cache
        with:
          path: .gtfs-cache-id
          key: gtfs-version
      - name: Validate configuration
        run: test -n "${{ vars.GTFS_URL }}" && test -n "${{ vars.SWISS_GTFS_URL }}"
      - name: Check if GTFS data has changed
        id: check_gtfs
        env:
          SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
        run: |
          GTFS_URL="${{ vars.GTFS_URL }}"
          ETAG=$(curl -sI --max-time 10 "$GTFS_URL" | grep -i 'etag\|last-modified' | tr '\n' ' ' || true)
          echo "etag=$ETAG" >> $GITHUB_OUTPUT
          if [ -f .gtfs-cache-id ]; then
            PREV=$(cat .gtfs-cache-id)
            if [ "$ETAG" = "$PREV" ] && [ -n "$ETAG" ]; then
              echo "skipped=true" >> $GITHUB_OUTPUT
              echo "GTFS unchanged, skipping rebuild"
              exit 0
            fi
          fi
          echo "$ETAG" > .gtfs-cache-id
          echo "skipped=false" >> $GITHUB_OUTPUT
      - name: Build city packages
        env:
          SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
        run: >-
          python scripts/build_stop_packages.py
          --gtfs-url "${{ vars.GTFS_URL }}"
          --swiss-gtfs-url "${{ vars.SWISS_GTFS_URL }}"
          --rnv-gateway-url "${{ vars.RNV_GATEWAY_URL }}"
          --vag-gateway-url "${{ vars.VAG_GATEWAY_URL }}"
      - name: Verify generated Pages content
        run: test -d docs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
